name: Auto-Update Coordinator Status

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - "frontend/**"
      - "*.md"
      - "!COORDINATOR_STATUS.md"

jobs:
  auto-update-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 5

      - name: Extract issue number from commit
        id: extract
        run: |
          # Get latest commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "commit_msg=$COMMIT_MSG" >> $GITHUB_OUTPUT

          # Extract issue number from commit (e.g., "Issue #9:" or "#9")
          ISSUE=$(echo "$COMMIT_MSG" | grep -oP '(?:Issue\s+)?#\K[0-9]+' | head -1)
          echo "issue=$ISSUE" >> $GITHUB_OUTPUT

          # Extract status hint from commit
          if echo "$COMMIT_MSG" | grep -iq "complete\|done\|finish\|✅"; then
            STATUS="done"
          elif echo "$COMMIT_MSG" | grep -iq "progress\|working\|update\|wip\|🟡"; then
            STATUS="progress"
          else
            STATUS="progress"
          fi
          echo "status=$STATUS" >> $GITHUB_OUTPUT

          echo "Detected Issue: $ISSUE"
          echo "Detected Status: $STATUS"
          echo "Commit: $COMMIT_MSG"

      - name: Set up Python
        if: steps.extract.outputs.issue != ''
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        if: steps.extract.outputs.issue != ''
        run: |
          python -m pip install pyyaml

      - name: Update COORDINATOR_STATUS.md
        if: steps.extract.outputs.issue != ''
        env:
          ISSUE_NUM: ${{ steps.extract.outputs.issue }}
          STATUS: ${{ steps.extract.outputs.status }}
          COMMIT_HASH: ${{ github.sha }}
          COMMIT_SHORT: ${{ github.sha }}
        run: |
          python .github/scripts/update-status.py "$ISSUE_NUM" "$STATUS" "${COMMIT_SHORT:0:7}"

      - name: Commit status update
        if: steps.extract.outputs.issue != ''
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          if git diff --quiet COORDINATOR_STATUS.md; then
            echo "No changes to commit"
          else
            git add COORDINATOR_STATUS.md
            git commit -m "🤖 Auto-update: Issue #${{ steps.extract.outputs.issue }} status (${{ steps.extract.outputs.status }})"
            git push
          fi

      - name: Create comment on related issue
        if: steps.extract.outputs.issue != ''
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = ${{ steps.extract.outputs.issue }};
            const status = '${{ steps.extract.outputs.status }}';
            const commitHash = '${{ github.sha }}'.substring(0, 7);

            const statusEmoji = status === 'done' ? '✅' : '🟡';
            const statusText = status === 'done' ? 'DONE' : 'IN PROGRESS';

            try {
              github.rest.issues.createComment({
                issue_number: issueNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `${statusEmoji} **Auto-updated**: Status marked as **${statusText}** (commit: ${commitHash})\n\n[Coordinator Dashboard](../../blob/main/COORDINATOR_STATUS.md)`
              });
            } catch (error) {
              console.log(`Could not comment on issue: ${error.message}`);
            }
